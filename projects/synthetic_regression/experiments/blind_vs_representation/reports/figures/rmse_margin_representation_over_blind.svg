<svg xmlns="http://www.w3.org/2000/svg" width="920" height="420" viewBox="0 0 920 420" role="img" aria-labelledby="title desc">
  <title id="title">RMSE margin for representation over blind</title>
  <desc id="desc">Bar chart of blind minus representation best cv_rmse_mean. All three margins are positive.</desc>
  <rect width="920" height="420" fill="#ffffff"/>
  <text x="460" y="24" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#172026">Representation improvement over blind</text>
  <text x="460" y="48" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#46535f">Margin = blind best_score_at_budget - representation best_score_at_budget</text>
  <line x1="90" y1="320" x2="850" y2="320" stroke="#2c333a" stroke-width="1.2"/>
  <line x1="90" y1="60" x2="90" y2="320" stroke="#2c333a" stroke-width="1.2"/>
  <g font-family="Arial, sans-serif" font-size="11" fill="#46535f">
    <line x1="85" y1="320" x2="850" y2="320" stroke="#d8dee4"/>
    <text x="78" y="324" text-anchor="end">0.00</text>
    <line x1="85" y1="247.8" x2="850" y2="247.8" stroke="#edf0f2"/>
    <text x="78" y="251.8" text-anchor="end">0.05</text>
    <line x1="85" y1="175.6" x2="850" y2="175.6" stroke="#edf0f2"/>
    <text x="78" y="179.6" text-anchor="end">0.10</text>
    <line x1="85" y1="103.3" x2="850" y2="103.3" stroke="#edf0f2"/>
    <text x="78" y="107.3" text-anchor="end">0.15</text>
  </g>
  <text x="22" y="190" transform="rotate(-90 22 190)" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#46535f">RMSE margin</text>
  <line x1="105" y1="140.7" x2="830" y2="140.7" stroke="#7b4ab0" stroke-width="2" stroke-dasharray="5 5"/>
  <text x="835" y="144.7" font-family="Arial, sans-serif" font-size="11" fill="#7b4ab0">mean 0.124</text>
  <g fill="#2f7dd1">
    <rect x="160" y="177.1" width="80" height="142.9"/>
    <rect x="390" y="73.7" width="80" height="246.3"/>
    <rect x="620" y="171.3" width="80" height="148.7"/>
  </g>
  <g font-family="Arial, sans-serif" font-size="12" fill="#172026">
    <text x="200" y="168" text-anchor="middle">0.0989</text>
    <text x="430" y="64" text-anchor="middle">0.1705</text>
    <text x="660" y="162" text-anchor="middle">0.1029</text>
    <text x="200" y="344" text-anchor="middle">bvr_20260620_001</text>
    <text x="430" y="344" text-anchor="middle">bvr_20260620_002</text>
    <text x="660" y="344" text-anchor="middle">bvr_20260621_001</text>
  </g>
</svg>
