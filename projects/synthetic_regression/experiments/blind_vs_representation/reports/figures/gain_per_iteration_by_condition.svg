<svg xmlns="http://www.w3.org/2000/svg" width="920" height="420" viewBox="0 0 920 420" role="img" aria-labelledby="title desc">
  <title id="title">Gain per iteration by condition and sample</title>
  <desc id="desc">Grouped bar chart of gain per iteration. Representation has higher gain per iteration than blind in all three samples.</desc>
  <rect width="920" height="420" fill="#ffffff"/>
  <text x="460" y="24" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#172026">Gain per iteration</text>
  <text x="460" y="48" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#46535f">Gain = first successful score minus best score, divided by successful iterations</text>
  <line x1="90" y1="320" x2="850" y2="320" stroke="#2c333a" stroke-width="1.2"/>
  <line x1="90" y1="60" x2="90" y2="320" stroke="#2c333a" stroke-width="1.2"/>
